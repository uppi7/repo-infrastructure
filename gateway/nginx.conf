# 大盘 Nginx 网关配置

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 基础信息组后端
    upstream backend_base {
        server backend-base:8081;
    }

    # 排课组后端
    upstream backend_course {
        server backend-course:8082;
    }

    server {
        listen 80;
        server_name _;

        location /base/ {
            alias /usr/share/nginx/html/base/;
            index index.html;
            try_files $uri $uri/ /base/index.html;
        }
        location /course/ {
            alias /usr/share/nginx/html/course/;
            index index.html;
            try_files $uri $uri/ /course/index.html;
        }

        location /api/base/ {
            proxy_pass         http://backend_base/api/base/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }


        # 健康检查端点
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
