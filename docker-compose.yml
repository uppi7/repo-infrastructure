version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} 
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - backend-net

  backend-base:
    image: zjuse-backend-base:latest
    container_name: backend-base
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: db_base
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-net

  backend-course:
    image: zjuse-backend-course:latest
    container_name: backend-course
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: db_course
      BASE_INFO_API_URL: ${BASE_INFO_API_URL}
    depends_on:
      mysql:
        condition: service_healthy
      backend-base:
        condition: service_started
    networks:
      - backend-net

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "8080:80"
    depends_on:
      - backend-base
      - backend-course
    networks:
      - backend-net

volumes:
  mysql_prod_data:

networks:
  backend-net:
    driver: bridge
